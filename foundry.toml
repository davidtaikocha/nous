[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"

[etherscan]
hoodi = { key = "${ETHERSCAN_API_KEY}", chain = 167013, url = "https://api.etherscan.io/v2/api?chainid=167013" }
